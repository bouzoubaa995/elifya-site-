<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elifya Solid Surface | Corian Casablanca</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
color:#111;
background:#fff;
}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 30px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-weight:600;
letter-spacing:3px;
}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1600607687920-4e2a09cf159d') center/cover;
display:flex;
align-items:center;
padding-left:40px;
color:white;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:42px;
max-width:500px;
}

/* SECTION */
.section{
padding:80px 30px;
}

.section h2{
font-family:'Playfair Display',serif;
font-size:30px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
margin-top:30px;
}

.grid img{
width:100%;
height:280px;
object-fit:cover;
border-radius:10px;
}

/* CTA */
.cta{
background:#111;
color:#fff;
padding:70px;
text-align:center;
}

.cta a{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:#fff;
color:#000;
text-decoration:none;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<div class="logo">ELIFYA</div>
</header>

<section class="hero">
<h1>Corian Casablanca<br>Design sur mesure haut de gamme</h1>
</section>

<section class="section">
<h2>Nos réalisations</h2>

<div class="grid">

<img src="https://images.unsplash.com/photo-1598300053653-9db3c1c63b8e">
<img src="https://images.unsplash.com/photo-1600566752227-8f5fdf2b9c84">
<img src="https://images.unsplash.com/photo-1588854337119-1c67a4c8df04">
<img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0">

</div>

</section>

<section class="cta">
<h2>Demandez votre devis</h2>
<a href="https://wa.me/212XXXXXXXXX">Contact WhatsApp</a>
</section>

<a class="whatsapp" href="https://wa.me/212XXXXXXXXX">WhatsApp</a>

</body>
</html>
